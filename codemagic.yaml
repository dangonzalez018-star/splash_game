workflows:
  flutter-android:
    name: Splash APK Build
    max_build_duration: 60
    environment:
      java: 11
      flutter: stable
    scripts:
      - name: Get packages
        script: |
          cd src
          flutter packages pub get
      - name: Build APK
        script: |
          cd src
          flutter build apk --release
    artifacts:
      - src/build/app/outputs/flutter-apk/*.apk
