workflows:
  flutter-android:
    name: Splash APK Build
    max_build_duration: 60
    environment:
      java: 11
      flutter: 3.16.9
    scripts:
      - name: Patch Android SDK Versions
        script: |
          cat << 'EOF' > patch_sdk.py
          import os, re
          p = 'src/android/app/build.gradle'
          if os.path.exists(p):
              c = open(p).read()
              c = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 34', c)
              c = re.sub(r'compileSdkVersion\s+flutter\.compileSdkVersion', 'compileSdkVersion 34', c)
              c = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 34', c)
              c = re.sub(r'targetSdkVersion\s+flutter\.targetSdkVersion', 'targetSdkVersion 34', c)
              open(p, 'w').write(c)
          EOF
          python3 patch_sdk.py
      - name: Get packages
        script: |
          cd src
          flutter packages pub get
      - name: Build APK
        script: |
          cd src
          flutter build apk --release
    artifacts:
      - src/build/app/outputs/flutter-apk/*.apk
